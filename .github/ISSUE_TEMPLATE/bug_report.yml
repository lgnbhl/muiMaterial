name: Bug report
description: Report something that does not work as expected.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reprex
    attributes:
      label: Reproducible example
      description: |
        A minimal `shinyApp(...)` (or component-only) example that
        reproduces the issue. Please make it self-contained.
      render: r
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include error messages, screenshots, or the rendered output.
    validations:
      required: false
  - type: textarea
    id: sessioninfo
    attributes:
      label: Session info
      description: Output of `sessionInfo()` or `sessioninfo::session_info()`.
      render: text
    validations:
      required: true
