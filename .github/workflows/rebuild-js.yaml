name: Rebuild JS bundle

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'js/package.json'
      - 'js/yarn.lock'

permissions:
  contents: write

jobs:
  rebuild:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: js/yarn.lock

      - name: Install dependencies and build bundle
        run: |
          yarn --cwd js install --frozen-lockfile
          yarn --cwd js webpack

      - name: Commit updated bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add inst/www/muiMaterial/mui-material.js
          git diff --cached --quiet || git commit -m "Rebuild JS bundle"
          git push
